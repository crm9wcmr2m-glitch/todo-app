<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapılacaklar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px;
    }

    h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #6c63ff; }

    .input-row button {
      padding: 12px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #574fd6; }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 7px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      color: #64748b;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filters button.active {
      border-color: #6c63ff;
      color: #6c63ff;
      font-weight: 600;
    }

    #todo-list { list-style: none; }

    #todo-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid #f1f5f9;
    }

    #todo-list li:last-child { border-bottom: none; }
    #todo-list li:hover { background: #f8fafc; }

    #todo-list li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    #todo-list li span {
      flex: 1;
      font-size: 1rem;
      color: #1e293b;
      word-break: break-word;
    }

    #todo-list li.done span {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .action-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; background: #fef2f2; }
    .edit-btn:hover   { color: #6c63ff; background: #ede9ff; }

    #todo-list li.editing { background: #f5f3ff; }

    .edit-input {
      flex: 1;
      padding: 6px 10px;
      border: 2px solid #6c63ff;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }

    .save-btn {
      padding: 5px 12px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .save-btn:hover { background: #574fd6; }

    .cancel-btn {
      padding: 5px 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #64748b;
      flex-shrink: 0;
    }

    .cancel-btn:hover { border-color: #94a3b8; }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #94a3b8;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.82rem;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: #ef4444; }

    .empty {
      text-align: center;
      color: #cbd5e1;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .loading {
      text-align: center;
      color: #a5b4fc;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .error-msg {
      background: #fef2f2;
      color: #ef4444;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapılacaklar</h1>
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="Yeni görev ekle..." maxlength="200">
      <button onclick="addTodo()">Ekle</button>
    </div>
    <div id="error-msg" class="error-msg"></div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Bekleyen</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>
    <ul id="todo-list"><li class="loading">Yükleniyor...</li></ul>
    <div class="footer">
      <span id="count-label"></span>
      <button class="clear-btn" onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://zvtisyltheuycvjffdis.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2dGlzeWx0aGV1eWN2amZmZGlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwODAsImV4cCI6MjA5MjI4NTA4MH0.reaEcUeRKU-HnbKdM7VtuosHT7xjjpercf6MTOTmTrM';
    const HEADERS = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=representation'
    };

    let todos = [];
    let filter = 'all';

    function api(path, options = {}) {
      return fetch(`${SUPABASE_URL}/rest/v1${path}`, {
        ...options,
        headers: { ...HEADERS, ...options.headers }
      }).then(async r => {
        if (!r.ok) throw new Error(await r.text());
        const text = await r.text();
        return text ? JSON.parse(text) : null;
      });
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    async function loadTodos() {
      try {
        todos = await api('/todos?order=created_at.asc');
        render();
      } catch (e) {
        showError('Veriler yüklenemedi: ' + e.message);
      }
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">Görev yok</li>';
      } else {
        list.innerHTML = filtered.map(t => t.editing ? `
          <li class="editing" data-id="${t.id}">
            <input type="checkbox" disabled style="opacity:0.3">
            <input class="edit-input" id="edit-${t.id}" value="${escHtml(t.text)}" maxlength="200"
              onkeydown="handleEditKey(event,${t.id})">
            <button class="save-btn" onclick="saveEdit(${t.id})">Kaydet</button>
            <button class="cancel-btn" onclick="cancelEdit(${t.id})">İptal</button>
          </li>
        ` : `
          <li class="${t.done ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
            <span ondblclick="startEdit(${t.id})" title="Düzenlemek için çift tıkla">${escHtml(t.text)}</span>
            <button class="action-btn edit-btn" onclick="startEdit(${t.id})" title="Düzenle">✎</button>
            <button class="action-btn delete-btn" onclick="remove(${t.id})" title="Sil">✕</button>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('count-label').textContent = `${remaining} görev bekliyor`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      try {
        const [row] = await api('/todos', {
          method: 'POST',
          body: JSON.stringify({ text, done: false })
        });
        todos.push(row);
        render();
      } catch (e) {
        showError('Görev eklenemedi: ' + e.message);
        input.value = text;
      }
    }

    async function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      const newDone = !t.done;
      t.done = newDone;
      render();
      try {
        await api(`/todos?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ done: newDone })
        });
      } catch (e) {
        t.done = !newDone;
        render();
        showError('Güncellenemedi: ' + e.message);
      }
    }

    function startEdit(id) {
      todos.forEach(t => { if (t.editing) t.editing = false; });
      const t = todos.find(t => t.id === id);
      if (t) t.editing = true;
      render();
      const el = document.getElementById('edit-' + id);
      if (el) { el.focus(); el.select(); }
    }

    async function saveEdit(id) {
      const el = document.getElementById('edit-' + id);
      const text = el ? el.value.trim() : '';
      if (!text) return;
      const t = todos.find(t => t.id === id);
      const oldText = t.text;
      t.text = text;
      t.editing = false;
      render();
      try {
        await api(`/todos?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ text })
        });
      } catch (e) {
        t.text = oldText;
        render();
        showError('Düzenlenemedi: ' + e.message);
      }
    }

    function cancelEdit(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.editing = false;
      render();
    }

    function handleEditKey(e, id) {
      if (e.key === 'Enter') saveEdit(id);
      if (e.key === 'Escape') cancelEdit(id);
    }

    async function remove(id) {
      todos = todos.filter(t => t.id !== id);
      render();
      try {
        await api(`/todos?id=eq.${id}`, { method: 'DELETE' });
      } catch (e) {
        showError('Silinemedi: ' + e.message);
        loadTodos();
      }
    }

    async function clearDone() {
      const doneIds = todos.filter(t => t.done).map(t => t.id);
      if (!doneIds.length) return;
      todos = todos.filter(t => !t.done);
      render();
      try {
        await api(`/todos?id=in.(${doneIds.join(',')})`, { method: 'DELETE' });
      } catch (e) {
        showError('Silinemedi: ' + e.message);
        loadTodos();
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    loadTodos();
  </script>
</body>
</html>
